<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Plataforma de jogos arcade" />
  <title>Dogao Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" id="app">

    <section class="screen menu-screen hidden" id="menuScreen">
      <img class="brand-logo" src="https://media.base44.com/images/public/6a065f6a3432e7e768396f1e/5e5cdcc9f_file_00000000419071f5977aff8a7d657fd9.png" alt="O Mega Dogao" />
      <div class="menu-header">
        <h1 class="menu-title">Dogao Games</h1>
        <p class="menu-subtitle">Escolha um jogo</p>
      </div>
      <div class="game-list" id="gameList"></div>
      <footer>PATROCINADO POR <strong>O MEGA DOGAO</strong> DESDE 2000</footer>
    </section>

    <section class="screen checkin-screen" id="socialScreen">
      <div class="checkin-card" style="max-width:340px;">
        <img src="https://media.base44.com/images/public/6a065f6a3432e7e768396f1e/5e5cdcc9f_file_00000000419071f5977aff8a7d657fd9.png" alt="O Mega Dogao" />
        <div class="checkin-badge">REDES SOCIAIS</div>
        <h2>SIGA A GENTE!</h2>
        <p>Ajude o Mega Dogao a crescer<br/>sigam nas redes sociais!</p>
        <a class="social-button instagram-button" id="socialInsta" href="https://www.instagram.com/omegadogaocwb/?hl=ar" target="_blank" rel="noopener">📷 Instagram</a>
        <a class="social-button facebook-button" id="socialFace" href="https://www.facebook.com/auaodogao" target="_blank" rel="noopener">📘 Facebook</a>
        <button class="skip-social-button" id="socialSkip" type="button">Depois vou la →</button>
      </div>
    </section>

    <div id="gameContainer" class="game-container hidden"></div>

    <button class="back-button hidden" id="backButton" type="button">← Voltar</button>

  </main>
  <script src="menu.js"></script>
  <script src="game-hotdog.js"></script>
  <script src="game-dino.js"></script>
</body>
</html>
