<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#47b9ff" />
    <title>Sky Tap</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Jogo Sky Tap">
      <canvas id="game" aria-label="Toque para voar e desviar dos canos"></canvas>

      <section class="hud" aria-live="polite">
        <div class="score-card">
          <span class="label">Pontos</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span class="label">Recorde</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <section class="overlay" id="overlay">
        <h1>Sky Tap</h1>
        <p id="message">Toque para comecar</p>
        <button id="start" type="button">Jogar</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
