<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a2e" />
  <meta name="description" content="Jogo Pinball clássico para jogar no navegador." />
  <title>Pinball - Mega Dogão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Poppins', sans-serif; background: #0a0a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .top-bar { width: 100%; max-width: 400px; display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; }
    .top-bar a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
    .top-bar a:hover { color: white; }
    .top-bar h1 { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.8); }
    .top-bar button { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: color 0.2s; }
    .top-bar button:hover { color: white; }
    .game-wrapper { width: 100%; max-width: 400px; border-radius: 1rem; overflow: hidden; box-shadow: 0 0 40px rgba(0,200,255,0.15); }
    canvas { width: 100%; display: block; touch-action: none; }
    .controls { margin-top: 1rem; display: flex; gap: 1.5rem; color: rgba(255,255,255,0.3); font-size: 0.75rem; }
    @media (max-width: 420px) {
      .top-bar { padding: 0.5rem 0.75rem; }
      .top-bar h1 { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">← Jogos</a>
    <h1>🕹️ Pinball</h1>
    <button id="restartBtn">Reiniciar</button>
  </div>
  <div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="controls">
    <span>← → ou toque nas laterais</span>
    <span>Espaço para lançar</span>
  </div>
  <script>
    const canvas = document.getElementById('gameCanvas')
    const ctx = canvas.getContext('2d')

    const W = 400, H = 700
    canvas.width = W
    canvas.height = H

    const BALL_R = 8
    const FLIPPER_W = 80, FLIPPER_H = 14, FLIPPER_R = 10
    const BUMPER_R = 22
    const GRAVITY = 0.15
    const FRICTION = 0.99

    const state = {
      ball: null, score: 0, lives: 3,
      gameState: 'ready',
      flippers: {
        left: { angle: 0.5, target: 0.5, x: 110, y: H - 70 },
        right: { angle: -0.5, target: -0.5, x: W - 110, y: H - 70 },
        hw: FLIPPER_W / 2,
      },
      bumpers: [],
      walls: [
        { x1: 30, y1: 100, x2: 30, y2: H - 100 },
        { x1: W - 30, y1: 100, x2: W - 30, y2: H - 100 },
        { x1: 30, y1: 100, x2: W - 30, y2: 100 },
        { x1: 30, y1: H - 100, x2: 80, y2: H - 20 },
        { x1: W - 30, y1: H - 100, x2: W - 80, y2: H - 20 },
      ],
    }

    for (let row = 0; row < 3; row++)
      for (let col = 0; col < 4; col++)
        state.bumpers.push({
          x: 80 + col * 80 + (row % 2) * 40,
          y: 140 + row * 70,
          r: BUMPER_R, points: 100 + row * 50,
          hit: false, hitTimer: 0,
        })

    function resetBall() {
      state.ball = { x: W / 2, y: H - 140, vx: (Math.random() - 0.5) * 2, vy: -6, r: BALL_R }
    }
    resetBall()

    function launch() {
      if (state.gameState === 'ready' && state.lives > 0) {
        state.gameState = 'playing'
        state.ball.x = W / 2; state.ball.y = H - 140
        state.ball.vx = (Math.random() - 0.5) * 2
        state.ball.vy = -6
      }
    }

    const keys = { left: false, right: false }
    const touch = { left: false, right: false }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a') { keys.left = true; e.preventDefault() }
      if (e.key === 'ArrowRight' || e.key === 'd') { keys.right = true; e.preventDefault() }
      if (e.key === ' ' || e.key === 'ArrowDown') { launch(); e.preventDefault() }
    })
    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a') { keys.left = false; e.preventDefault() }
      if (e.key === 'ArrowRight' || e.key === 'd') { keys.right = false; e.preventDefault() }
    })

    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0]; if (!t) return
      const rect = canvas.getBoundingClientRect()
      touch.left = (t.clientX - rect.left) < rect.width / 2
      touch.right = !touch.left
      launch()
      e.preventDefault()
    }, { passive: false })
    canvas.addEventListener('touchend', e => { touch.left = false; touch.right = false; e.preventDefault() }, { passive: false })
    canvas.addEventListener('touchmove', e => {
      const t = e.touches[0]; if (!t) return
      const rect = canvas.getBoundingClientRect()
      touch.left = (t.clientX - rect.left) < rect.width / 2
      touch.right = !touch.left
      e.preventDefault()
    }, { passive: false })
    canvas.addEventListener('click', launch)

    document.getElementById('restartBtn').addEventListener('click', () => {
      state.lives = 3; state.score = 0; state.gameState = 'ready'
      state.ball.x = W / 2; state.ball.y = H - 140
      state.ball.vx = 0; state.ball.vy = 0
    })

    function update() {
      const fl = state.flippers
      const leftActive = keys.left || touch.left
      const rightActive = keys.right || touch.right
      fl.left.target = leftActive ? -0.5 : 0.5
      fl.right.target = rightActive ? 0.5 : -0.5
      fl.left.angle += (fl.left.target - fl.left.angle) * 0.3
      fl.right.angle += (fl.right.target - fl.right.angle) * 0.3

      if (state.gameState !== 'playing' || !state.ball) return
      const b = state.ball
      b.vy += GRAVITY; b.vx *= FRICTION; b.vy *= FRICTION
      b.x += b.vx; b.y += b.vy

      if (b.y + b.r > H - 20) {
        state.lives--
        if (state.lives <= 0) { state.gameState = 'gameover'; return }
        state.gameState = 'ready'
        b.x = W / 2; b.y = H - 140; b.vx = 0; b.vy = 0
        return
      }

      for (const w of state.walls) {
        const dx = w.x2 - w.x1, dy = w.y2 - w.y1
        const len = Math.sqrt(dx * dx + dy * dy)
        const nx = -dy / len, ny = dx / len
        const d = (b.x - w.x1) * nx + (b.y - w.y1) * ny
        if (Math.abs(d) < b.r) {
          const t = ((b.x - w.x1) * dx + (b.y - w.y1) * dy) / (len * len)
          if (t >= 0 && t <= 1) {
            const dot = b.vx * nx + b.vy * ny
            if (dot < 0) {
              b.vx -= 2 * dot * nx; b.vy -= 2 * dot * ny
              b.vx *= 0.95; b.vy *= 0.95
              b.x += nx * (b.r - Math.abs(d) + 1)
              b.y += ny * (b.r - Math.abs(d) + 1)
            }
          }
        }
      }

      if (b.x - b.r < 5) { b.x = b.r + 5; b.vx = Math.abs(b.vx) * 0.8 }
      if (b.x + b.r > W - 5) { b.x = W - b.r - 5; b.vx = -Math.abs(b.vx) * 0.8 }
      if (b.y - b.r < 95) { b.y = b.r + 95; b.vy = Math.abs(b.vy) * 0.8 }

      ;[
        { cx: fl.left.x, cy: fl.left.y, angle: fl.left.angle },
        { cx: fl.right.x, cy: fl.right.y, angle: fl.right.angle },
      ].forEach(f => {
        const cos = Math.cos(f.angle), sin = Math.sin(f.angle)
        const hw = FLIPPER_W / 2
        const dx = b.x - f.cx, dy = b.y - f.cy
        const lx = dx * cos + dy * sin, ly = -dx * sin + dy * cos
        if (lx >= -hw - 10 && lx <= hw + 10 && ly >= -FLIPPER_H / 2 - BALL_R && ly <= FLIPPER_H / 2 + BALL_R) {
          if (ly > 0 && Math.abs(lx) <= hw + BALL_R) {
            b.vy -= 3
            const push = lx / hw
            b.vx += push * 0.8
          }
        }
      })

      for (const bumper of state.bumpers) {
        const dx = b.x - bumper.x, dy = b.y - bumper.y
        const d = Math.sqrt(dx * dx + dy * dy)
        if (d < b.r + bumper.r) {
          const n = { x: dx / d, y: dy / d }
          const dot = b.vx * n.x + b.vy * n.y
          if (dot < 0) {
            b.vx -= 2 * dot * n.x * 1.3; b.vy -= 2 * dot * n.y * 1.3
            b.x = bumper.x + n.x * (bumper.r + b.r + 2)
            b.y = bumper.y + n.y * (bumper.r + b.r + 2)
            state.score += bumper.points
            bumper.hit = true; bumper.hitTimer = 10
          }
        }
        if (bumper.hitTimer > 0) bumper.hitTimer--
        else bumper.hit = false
      }

      const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy)
      if (speed > 12) { b.vx = (b.vx / speed) * 12; b.vy = (b.vy / speed) * 12 }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H)
      const grad = ctx.createLinearGradient(0, 0, 0, H)
      grad.addColorStop(0, '#0a0a2e'); grad.addColorStop(0.5, '#1a1a4e'); grad.addColorStop(1, '#0d0d3d')
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H)

      ctx.shadowColor = 'rgba(0,200,255,0.3)'; ctx.shadowBlur = 20
      ctx.strokeStyle = '#00c8ff'; ctx.lineWidth = 3
      ctx.strokeRect(5, 95, W - 10, H - 120); ctx.shadowBlur = 0

      const fl = state.flippers
      function drawFlipper(cx, cy, angle) {
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle)
        ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 15
        ctx.fillStyle = '#ff4444'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.moveTo(-fl.hw, -FLIPPER_R)
        ctx.quadraticCurveTo(-fl.hw - 8, 0, -fl.hw, FLIPPER_R)
        ctx.lineTo(fl.hw, FLIPPER_R)
        ctx.quadraticCurveTo(fl.hw + 8, 0, fl.hw, -FLIPPER_R)
        ctx.closePath(); ctx.fill(); ctx.stroke()
        ctx.shadowBlur = 0; ctx.restore()
      }
      drawFlipper(fl.left.x, fl.left.y, fl.left.angle)
      drawFlipper(fl.right.x, fl.right.y, fl.right.angle)

      for (const bumper of state.bumpers) {
        const isHit = bumper.hit
        ctx.shadowColor = isHit ? '#ffff00' : '#ff8800'
        ctx.shadowBlur = isHit ? 30 : 15
        const bg = ctx.createRadialGradient(bumper.x - 5, bumper.y - 5, 2, bumper.x, bumper.y, bumper.r)
        if (isHit) { bg.addColorStop(0, '#fff'); bg.addColorStop(0.5, '#ff0'); bg.addColorStop(1, '#f80') }
        else { bg.addColorStop(0, '#fc0'); bg.addColorStop(0.5, '#f80'); bg.addColorStop(1, '#c40') }
        ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(bumper.x, bumper.y, bumper.r, 0, Math.PI * 2); ctx.fill()
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); ctx.shadowBlur = 0
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Poppins, sans-serif'
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
        ctx.fillText(bumper.points, bumper.x, bumper.y)
      }

      if (state.ball && state.gameState === 'playing') {
        const b = state.ball
        ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 20
        const bg = ctx.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, b.r)
        bg.addColorStop(0, '#fff'); bg.addColorStop(0.3, '#8fc'); bg.addColorStop(1, '#0f8')
        ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill()
        ctx.shadowBlur = 0
      }

      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Poppins, sans-serif'
      ctx.textAlign = 'left'; ctx.textBaseline = 'top'
      ctx.fillText(`Score: ${state.score}`, 12, 12)
      ctx.textAlign = 'right'
      let livesStr = ''
      for (let i = 0; i < state.lives; i++) livesStr += '\u{1F7E2}'
      for (let i = state.lives; i < 3; i++) livesStr += '\u{26AB}'
      ctx.fillText(livesStr, W - 12, 12)

      if (state.gameState === 'ready' && state.lives > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, H / 2 - 40, W, 80)
        ctx.fillStyle = '#00ff88'; ctx.font = 'bold 22px Poppins, sans-serif'
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
        ctx.fillText('TOQUE PARA LANÇAR', W / 2, H / 2)
      }

      if (state.gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, H / 2 - 60, W, 120)
        ctx.fillStyle = '#ff4444'; ctx.font = 'bold 30px Poppins, sans-serif'
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
        ctx.fillText('GAME OVER', W / 2, H / 2 - 20)
        ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 18px Poppins, sans-serif'
        ctx.fillText(`Score Final: ${state.score}`, W / 2, H / 2 + 25)
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop) }
    loop()
  </script>
</body>
</html>
