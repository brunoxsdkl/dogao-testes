<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a2e" />
  <meta name="description" content="Jogo Pinball classico do Mega Dogao." />
  <title>Pinball - Mega Dogão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Fredoka One',cursive;background:#0a0a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
    .top-bar{width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;position:relative;z-index:10}
    .top-bar a{color:rgba(255,255,255,0.4);text-decoration:none;font-size:0.85rem;transition:color 0.2s}
    .top-bar a:hover{color:#ffd700}
    .top-bar h1{font-size:1rem;color:rgba(255,255,255,0.7)}
    .top-bar button{background:none;border:none;color:rgba(255,255,255,0.5);font-size:0.85rem;cursor:pointer;font-family:inherit;transition:color 0.2s}
    .top-bar button:hover{color:#ffd700}
    .game-wrapper{width:100%;max-width:420px;border-radius:1rem;overflow:hidden;box-shadow:0 0 60px rgba(0,200,255,0.12);position:relative}
    canvas{width:100%;display:block;touch-action:none}
    .controls{display:flex;gap:2rem;margin-top:0.75rem;color:rgba(255,255,255,0.2);font-size:0.75rem;font-family:'Press Start 2P',monospace;font-size:0.5rem;text-align:center}
    .controls span{max-width:160px}
    @media(max-width:420px){.top-bar{padding:0.4rem 0.75rem}.top-bar h1{font-size:0.85rem}}
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">← Jogos</a>
    <h1>🕹️ Pinball</h1>
    <button id="resetBtn">Reiniciar</button>
  </div>
  <div class="game-wrapper">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <span>← → ou toque nas laterais</span>
    <span>↓ ou toque no centro = lançar</span>
  </div>
  <script>
    const HS_KEY = 'pinball_megadogao_hs'
    const C = document.getElementById('c')
    const X = C.getContext('2d')
    const W = 400, H = 680
    C.width = W; C.height = H

    const BALL_R = 7
    const FLIP_LEN = 140
    const FLIP_W = 16
    const GRAV = 0.12
    const DRAIN_Y = H - 16

    let actx = null
    function audio() {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)()
      if (actx.state === 'suspended') actx.resume()
      return actx
    }
    function sfx(f, d, t='square', v=0.12) {
      try {
        const a = audio(), o = a.createOscillator(), g = a.createGain()
        o.type = t; o.frequency.setValueAtTime(f, a.currentTime)
        g.gain.setValueAtTime(v, a.currentTime)
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d)
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + d)
      } catch(e) {}
    }
    const SFX = {
      bumper: ()=>sfx(520,0.12,'square',0.1),
      launch: ()=>{sfx(240,0.2,'sine',0.15);setTimeout(()=>sfx(360,0.15,'sine',0.12),100)},
      flipper: ()=>sfx(180,0.04,'square',0.06),
      drain: ()=>sfx(120,0.4,'sawtooth',0.15),
      multi: ()=>{sfx(660,0.1,'sine',0.1);setTimeout(()=>sfx(880,0.1,'sine',0.1),80);setTimeout(()=>sfx(1100,0.12,'sine',0.1),160)},
      target: ()=>sfx(440,0.08,'sine',0.1),
    }

    const S = {
      score: 0, hiScore: parseInt(localStorage.getItem(HS_KEY)||'0'),
      lives: 3, phase: 'launch',
      shake: 0, frame: 0,
      ball: null,
      fl: {
        L: { a: 0.45, t: 0.45, x: 55, y: H-70 },
        R: { a: Math.PI-0.45, t: Math.PI-0.45, x: 345, y: H-70 }
      },
      bumpers: [], pops: [], targets: [], stars: [],
      particles: [], floatTexts: [],
      plunger: { pct: 0, charging: false, power: 0 },
      multi: 1, multiTimer: 0, ballSave: false, ballSaveTimer: 0,
    }

    const WALLS = [
      { x1: 24, y1: 40, x2: 24, y2: H-85 },
      { x1: W-24, y1: 40, x2: W-24, y2: H-85 },
      { x1: 24, y1: 40, x2: W-24, y2: 40 },
      { x1: 24, y1: H-85, x2: 90, y2: H-12 },
      { x1: W-24, y1: H-85, x2: W-90, y2: H-12 },
    ]

    function flipperSeg(side) {
      const f = S.fl[side], ca = Math.cos(f.a), sa = Math.sin(f.a)
      return { x1: f.x, y1: f.y, x2: f.x + FLIP_LEN*ca, y2: f.y + FLIP_LEN*sa, nx: -sa, ny: ca }
    }

    function distToSeg(px, py, x1, y1, x2, y2) {
      const dx = x2-x1, dy = y2-y1, len2 = dx*dx+dy*dy
      if (!len2) return Math.hypot(px-x1, py-y1)
      let t = ((px-x1)*dx + (py-y1)*dy)/len2
      t = Math.max(0, Math.min(1, t))
      return Math.hypot(px-(x1+t*dx), py-(y1+t*dy))
    }

    function closestOnSeg(px, py, x1, y1, x2, y2) {
      const dx = x2-x1, dy = y2-y1, len2 = dx*dx+dy*dy
      if (!len2) return { x: x1, y: y1, t: 0 }
      let t = ((px-x1)*dx + (py-y1)*dy)/len2
      t = Math.max(0, Math.min(1, t))
      return { x: x1+t*dx, y: y1+t*dy, t }
    }

    function setup() {
      for (let r = 0; r < 3; r++)
        for (let c = 0; c < 4; c++)
          S.bumpers.push({
            x: 75+c*70+(r%2)*35, y: 90+r*65,
            r: 20, pts: 100+r*50, hit: 0, color: '#f80'
          })
      for (let r = 0; r < 2; r++)
        for (let c = 0; c < 3; c++)
          S.pops.push({
            x: 90+c*100+(r%2)*50, y: 310+r*55,
            r: 14, pts: 50, hit: 0, color: '#08c'
          })
      S.targets = [
        { x: 60, y: 210, w: 16, h: 28, pts: 200, up: true, timer: 0 },
        { x: W/2-8, y: 200, w: 16, h: 28, pts: 300, up: true, timer: 0 },
        { x: W-76, y: 210, w: 16, h: 28, pts: 200, up: true, timer: 0 },
      ]
      S.stars = [
        { x: W/2, y: 55, r: 12, active: true, timer: 0 },
        { x: 52, y: 52, r: 10, active: true, timer: 0 },
        { x: W-52, y: 52, r: 10, active: true, timer: 0 },
      ]
    }
    setup()

    function newBall() {
      return { x: W/2, y: H-180, vx: (Math.random()-0.5)*1.5, vy: -5, r: BALL_R, trail: [] }
    }

    function resetBall() {
      S.ball = newBall()
      S.phase = 'launch'
      S.plunger.power = 0
      S.plunger.pct = 0
    }

    function launch() {
      if (S.phase === 'launch' && S.lives > 0) {
        const pwr = 3.5 + S.plunger.power * 0.05
        S.ball.vy = -pwr
        S.ball.vx += (Math.random()-0.5)*0.8
        S.phase = 'playing'
        SFX.launch()
        S.ballSave = true; S.ballSaveTimer = 120
      } else if (S.phase === 'over') {
        S.lives = 3; S.score = 0; S.multi = 1; S.multiTimer = 0; S.particles = []; S.floatTexts = []
        resetBall()
      }
    }

    function addParticles(x, y, color, n=12, sp=3) {
      for (let i = 0; i < n; i++) {
        const a = Math.random()*Math.PI*2, s = Math.random()*sp+1
        S.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s-1, life: 1, decay: 0.015+Math.random()*0.02, r: 2+Math.random()*3, color })
      }
    }
    function addFloat(x, y, text, color='#ffd700') {
      S.floatTexts.push({ x, y, text, color, life: 1, vy: -1.5 })
    }

    const KEYS = { left: false, right: false }
    const TCH = { left: false, right: false, center: false }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'||e.key === 'a') { KEYS.left = true; e.preventDefault() }
      if (e.key === 'ArrowRight'||e.key === 'd') { KEYS.right = true; e.preventDefault() }
      if (e.key === ' '||e.key === 'ArrowDown') { if (S.phase === 'launch') S.plunger.charging = true; e.preventDefault() }
    })
    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft'||e.key === 'a') { KEYS.left = false; e.preventDefault() }
      if (e.key === 'ArrowRight'||e.key === 'd') { KEYS.right = false; e.preventDefault() }
      if (e.key === ' '||e.key === 'ArrowDown') { S.plunger.charging = false; if (S.phase === 'launch') launch(); e.preventDefault() }
    })

    C.addEventListener('touchstart', e => {
      const t = e.touches[0]; if (!t) return
      const r = C.getBoundingClientRect(), x = t.clientX - r.left, w = r.width
      const cw = w*0.3
      if (x > (w-cw)/2 && x < (w+cw)/2) {
        if (S.phase === 'launch') S.plunger.charging = true
      } else {
        TCH.left = x < w/2; TCH.right = !TCH.left
      }
      if (S.phase === 'over') launch()
      e.preventDefault()
    }, { passive: false })
    C.addEventListener('touchend', e => {
      if (S.plunger.charging) { S.plunger.charging = false; launch() }
      TCH.left = false; TCH.right = false
      e.preventDefault()
    }, { passive: false })
    C.addEventListener('touchmove', e => {
      const t = e.touches[0]; if (!t) return
      const r = C.getBoundingClientRect(), x = t.clientX - r.left
      TCH.left = x < r.width/2; TCH.right = !TCH.left
      e.preventDefault()
    }, { passive: false })
    C.addEventListener('mousedown', e => {
      if (S.phase === 'over') { launch(); return }
      if (S.phase === 'launch') { S.plunger.charging = true; return }
    })
    C.addEventListener('mouseup', e => {
      if (S.plunger.charging) { S.plunger.charging = false; launch() }
    })

    document.getElementById('resetBtn').addEventListener('click', () => {
      S.lives = 3; S.score = 0; S.multi = 1; S.multiTimer = 0; S.particles = []; S.floatTexts = []
      S.targets.forEach(t => t.up = true)
      S.stars.forEach(s => s.active = true)
      resetBall()
    })

    function collideCircle(bx, by, br, cx, cy, cr) {
      const d = Math.hypot(bx-cx, by-cy)
      if (d < br+cr) {
        const nx = (bx-cx)/d, ny = (by-cy)/d
        return { hit: true, nx, ny, overlap: br+cr-d }
      }
      return { hit: false }
    }

    function update() {
      S.frame++
      const lAct = KEYS.left || TCH.left
      const rAct = KEYS.right || TCH.right
      const fl = S.fl

      fl.L.t = lAct ? -0.5 : 0.45
      fl.R.t = rAct ? Math.PI+0.5 : Math.PI-0.45
      fl.L.a += (fl.L.t - fl.L.a) * 0.3
      fl.R.a += (fl.R.t - fl.R.a) * 0.3

      if (S.plunger.charging) {
        S.plunger.power = Math.min(S.plunger.power + 2.5, 100)
        S.plunger.pct = S.plunger.power/100
      }
      if (S.ballSaveTimer > 0) { S.ballSaveTimer--; if (!S.ballSaveTimer) S.ballSave = false }
      if (S.multiTimer > 0) { S.multiTimer--; if (!S.multiTimer) S.multi = 1 }

      if (S.phase !== 'playing' || !S.ball) return

      const b = S.ball
      b.vy += GRAV
      b.vx *= 0.995; b.vy *= 0.995
      b.x += b.vx; b.y += b.vy
      b.trail.push({ x: b.x, y: b.y })
      if (b.trail.length > 10) b.trail.shift()

      if (S.shake > 0.5) S.shake *= 0.85; else S.shake = 0

      if (b.y + b.r > DRAIN_Y) {
        if (S.ballSave) {
          b.y = H-130; b.vy = -3; b.vx = (Math.random()-0.5)*2
          S.ballSave = false; addFloat(W/2, H/2, 'SALVO!', '#0f8')
          return
        }
        SFX.drain(); S.lives--
        addParticles(b.x, b.y, '#f44', 20, 4); S.shake = 6
        if (S.lives <= 0) { S.phase = 'over'; b.trail = []; return }
        resetBall()
        return
      }

      if (b.x-b.r < 5) { b.x = b.r+5; b.vx = Math.abs(b.vx)*0.7 }
      if (b.x+b.r > W-5) { b.x = W-b.r-5; b.vx = -Math.abs(b.vx)*0.7 }
      if (b.y-b.r < 35) { b.y = b.r+35; b.vy = Math.abs(b.vy)*0.7 }

      for (const w of WALLS) {
        const dx = w.x2-w.x1, dy = w.y2-w.y1, len = Math.hypot(dx, dy)
        const nx = -dy/len, ny = dx/len
        const d = (b.x-w.x1)*nx + (b.y-w.y1)*ny
        if (Math.abs(d) < b.r) {
          const t = ((b.x-w.x1)*dx + (b.y-w.y1)*dy)/(len*len)
          if (t >= 0 && t <= 1) {
            const dot = b.vx*nx + b.vy*ny
            if (dot < 0) {
              b.vx -= 2*dot*nx; b.vy -= 2*dot*ny
              b.vx *= 0.9; b.vy *= 0.9
              b.x += nx*(b.r-Math.abs(d)+1)
              b.y += ny*(b.r-Math.abs(d)+1)
            }
          }
        }
      }

      for (const side of ['L', 'R']) {
        const seg = flipperSeg(side)
        const dist = distToSeg(b.x, b.y, seg.x1, seg.y1, seg.x2, seg.y2)
        const threshold = BALL_R + FLIP_W/2
        if (dist < threshold) {
          const cp = closestOnSeg(b.x, b.y, seg.x1, seg.y1, seg.x2, seg.y2)
          const nx = (b.x-cp.x)/dist || seg.nx
          const ny = (b.y-cp.y)/dist || seg.ny
          const overlap = threshold - dist
          b.x += nx*overlap; b.y += ny*overlap
          const dot = b.vx*nx + b.vy*ny
          if (dot < 0) {
            b.vx -= 1.8*dot*nx; b.vy -= 1.8*dot*ny
          }
          const isAct = (side === 'L' && lAct) || (side === 'R' && rAct)
          if (isAct) {
            b.vx += nx*5; b.vy += ny*5
            SFX.flipper()
          }
        }
      }

      for (const bumper of S.bumpers) {
        const c = collideCircle(b.x, b.y, b.r, bumper.x, bumper.y, bumper.r)
        if (c.hit) {
          const dot = b.vx*c.nx + b.vy*c.ny
          if (dot < 0) {
            b.vx -= 2*dot*c.nx*1.3; b.vy -= 2*dot*c.ny*1.3
            b.x = bumper.x + c.nx*(bumper.r+b.r+1)
            b.y = bumper.y + c.ny*(bumper.r+b.r+1)
            const pts = Math.floor(bumper.pts*S.multi)
            S.score += pts; bumper.hit = 20
            SFX.bumper(); addParticles(bumper.x, bumper.y, '#f80', 8, 3)
            addFloat(bumper.x, bumper.y-15, `+${pts}`, '#fc0')
            S.shake = Math.max(S.shake, 2)
          }
        }
        if (bumper.hit > 0) bumper.hit--
      }

      for (const pop of S.pops) {
        const c = collideCircle(b.x, b.y, b.r, pop.x, pop.y, pop.r)
        if (c.hit) {
          const dot = b.vx*c.nx + b.vy*c.ny
          if (dot < 0) {
            b.vx -= 2*dot*c.nx*1.2; b.vy -= 2*dot*c.ny*1.2
            b.x = pop.x + c.nx*(pop.r+b.r+1)
            b.y = pop.y + c.ny*(pop.r+b.r+1)
            const pts = Math.floor(pop.pts*S.multi)
            S.score += pts; pop.hit = 15
            SFX.target(); addParticles(pop.x, pop.y, '#0cf', 6, 2)
          }
        }
        if (pop.hit > 0) pop.hit--
      }

      for (const star of S.stars) {
        if (!star.active) continue
        const c = collideCircle(b.x, b.y, b.r, star.x, star.y, star.r)
        if (c.hit) {
          star.active = false; star.timer = 300
          S.multi = Math.min(S.multi+0.5, 5); S.multiTimer = 600
          S.score += 250
          SFX.multi(); addParticles(star.x, star.y, '#fd0', 20, 5)
          addFloat(star.x, star.y-20, `x${S.multi}`, '#fd0')
          S.shake = 3
          const dot = b.vx*c.nx + b.vy*c.ny
          if (dot < 0) { b.vx -= 2*dot*c.nx; b.vy -= 2*dot*c.ny }
          b.x = star.x+c.nx*(star.r+b.r+1)
          b.y = star.y+c.ny*(star.r+b.r+1)
        }
      }
      for (const star of S.stars) {
        if (!star.active && star.timer > 0) { star.timer--; if (!star.timer) star.active = true }
      }

      for (const t of S.targets) {
        if (!t.up) {
          if (t.timer > 0) t.timer--
          else t.up = true
          continue
        }
        if (b.x+b.r > t.x && b.x-b.r < t.x+t.w && b.y+b.r > t.y && b.y-b.r < t.y+t.h) {
          t.up = false; t.timer = 180
          const pts = Math.floor(t.pts*S.multi)
          S.score += pts
          SFX.target(); addParticles(t.x+t.w/2, t.y+t.h/2, '#0f8', 10, 3)
          addFloat(t.x+t.w/2, t.y-5, `+${pts}`, '#0f8')
          S.shake = 2
          b.vy = -Math.abs(b.vy)*0.8
          b.y = t.y+t.h+b.r+1
        }
      }

      const spd = Math.hypot(b.vx, b.vy)
      if (spd > 15) { b.vx = (b.vx/spd)*15; b.vy = (b.vy/spd)*15 }
    }

    function draw() {
      X.save()
      if (S.shake > 0.5) {
        X.translate((Math.random()-0.5)*S.shake*2, (Math.random()-0.5)*S.shake*2)
      }

      const bg = X.createRadialGradient(W/2, H/2, 100, W/2, H/2, 500)
      bg.addColorStop(0, '#12123a'); bg.addColorStop(0.5, '#0a0a2e'); bg.addColorStop(1, '#050520')
      X.fillStyle = bg; X.fillRect(0, 0, W, H)

      for (let i = 0; i < 30; i++) {
        const sx = (i*137+50)%W, sy = (i*97+30)%H
        X.fillStyle = `rgba(255,255,255,${0.03+Math.sin(S.frame*0.02+i)*0.02})`
        X.beginPath(); X.arc(sx, sy, 1, 0, Math.PI*2); X.fill()
      }

      X.shadowColor = '#0cf'; X.shadowBlur = 15
      X.strokeStyle = '#0cf'; X.lineWidth = 3; X.shadowBlur = 25
      X.beginPath(); X.roundRect(10, 30, W-20, H-80, 12); X.stroke()
      X.shadowBlur = 0

      for (const w of WALLS) {
        X.strokeStyle = '#f64'; X.lineWidth = 4; X.shadowColor = '#f44'; X.shadowBlur = 8
        X.beginPath(); X.moveTo(w.x1, w.y1); X.lineTo(w.x2, w.y2); X.stroke()
        X.shadowBlur = 0
      }

      for (const side of ['L', 'R']) {
        const f = S.fl[side]
        const seg = flipperSeg(side)
        X.save()
        X.shadowColor = '#f33'; X.shadowBlur = 20
        const grd = X.createLinearGradient(seg.x1, seg.y1, seg.x2, seg.y2)
        grd.addColorStop(0, '#f22'); grd.addColorStop(0.5, '#f64'); grd.addColorStop(1, '#f22')
        X.strokeStyle = grd; X.lineWidth = FLIP_W
        X.lineCap = 'round'
        X.beginPath(); X.moveTo(seg.x1, seg.y1); X.lineTo(seg.x2, seg.y2); X.stroke()
        X.strokeStyle = '#fff'; X.lineWidth = 2
        X.beginPath(); X.moveTo(seg.x1, seg.y1); X.lineTo(seg.x2, seg.y2); X.stroke()
        X.shadowBlur = 0; X.restore()
      }

      for (const bumper of S.bumpers) {
        const hit = bumper.hit > 0
        X.shadowColor = hit ? '#ff0' : '#f80'; X.shadowBlur = hit ? 35 : 18
        const bg = X.createRadialGradient(bumper.x-4, bumper.y-4, 2, bumper.x, bumper.y, bumper.r+4)
        if (hit) { bg.addColorStop(0,'#fff'); bg.addColorStop(0.3,'#ff0'); bg.addColorStop(1,'#f80') }
        else { bg.addColorStop(0,'#fc0'); bg.addColorStop(0.4,'#f80'); bg.addColorStop(1,'#c40') }
        X.fillStyle = bg; X.beginPath(); X.arc(bumper.x, bumper.y, bumper.r+2, 0, Math.PI*2); X.fill()
        X.strokeStyle = '#fff'; X.lineWidth = 2; X.stroke(); X.shadowBlur = 0
        X.fillStyle = hit ? '#fff' : '#fd0'
        X.font = 'bold 12px "Fredoka One", sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle'
        X.fillText(bumper.pts, bumper.x, bumper.y)
      }

      for (const pop of S.pops) {
        const hit = pop.hit > 0
        X.shadowColor = hit ? '#0ef' : '#08c'; X.shadowBlur = hit ? 25 : 12
        X.fillStyle = hit ? '#8ef' : '#26a'
        X.beginPath(); X.arc(pop.x, pop.y, pop.r, 0, Math.PI*2); X.fill()
        X.strokeStyle = '#0cf'; X.lineWidth = 2; X.stroke(); X.shadowBlur = 0
        X.fillStyle = '#fff'; X.font = 'bold 9px "Fredoka One", sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle'
        X.fillText(pop.pts, pop.x, pop.y+1)
      }

      for (const star of S.stars) {
        if (!star.active) continue
        const pulse = 1+Math.sin(S.frame*0.05)*0.15
        X.shadowColor = '#fd0'; X.shadowBlur = 25
        X.fillStyle = '#fd0'; X.beginPath(); X.arc(star.x, star.y, star.r*pulse, 0, Math.PI*2); X.fill()
        X.fillStyle = '#fff'; X.font = 'bold 14px sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle'
        X.fillText('★', star.x, star.y+1); X.shadowBlur = 0
        X.fillStyle = 'rgba(255,215,0,0.3)'; X.font = '10px "Press Start 2P", monospace'
        X.fillText('MULTI', star.x, star.y+star.r+14)
      }

      for (const t of S.targets) {
        if (!t.up) {
          X.fillStyle = 'rgba(0,255,136,0.2)'; X.shadowBlur = 0
          X.beginPath(); X.roundRect(t.x, t.y, t.w, t.h, 3); X.fill()
          continue
        }
        X.shadowColor = '#0f8'; X.shadowBlur = 15
        const bg = X.createLinearGradient(t.x, t.y, t.x, t.y+t.h)
        bg.addColorStop(0, '#0f8'); bg.addColorStop(1, '#080')
        X.fillStyle = bg; X.beginPath(); X.roundRect(t.x, t.y, t.w, t.h, 3); X.fill()
        X.strokeStyle = '#fff'; X.lineWidth = 1.5; X.stroke(); X.shadowBlur = 0
        X.fillStyle = '#fff'; X.font = 'bold 10px sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle'
        X.fillText(t.pts, t.x+t.w/2, t.y+t.h/2)
      }

      if (S.ball) {
        const b = S.ball
        for (let i = 0; i < b.trail.length; i++) {
          const tr = b.trail[i], a = i/b.trail.length
          X.fillStyle = `rgba(0,255,136,${a*0.3})`
          X.beginPath(); X.arc(tr.x, tr.y, b.r*a*0.6, 0, Math.PI*2); X.fill()
        }
        if (S.phase === 'playing' || S.phase === 'launch') {
          X.shadowColor = '#0f8'; X.shadowBlur = 25
          const bg = X.createRadialGradient(b.x-3, b.y-3, 1, b.x, b.y, b.r+2)
          bg.addColorStop(0,'#fff'); bg.addColorStop(0.3,'#8fc'); bg.addColorStop(1,'#0f8')
          X.fillStyle = bg; X.beginPath(); X.arc(b.x, b.y, b.r+1, 0, Math.PI*2); X.fill()
          X.shadowBlur = 0
        }
      }

      for (const p of S.particles) {
        X.globalAlpha = p.life; X.fillStyle = p.color
        X.beginPath(); X.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); X.fill()
      }
      X.globalAlpha = 1

      for (const ft of S.floatTexts) {
        X.globalAlpha = ft.life; X.fillStyle = ft.color
        X.font = 'bold 16px "Fredoka One", sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle'
        X.shadowColor = 'rgba(0,0,0,0.5)'; X.shadowBlur = 4
        X.fillText(ft.text, ft.x, ft.y); X.shadowBlur = 0
      }
      X.globalAlpha = 1

      if (S.phase === 'launch' && S.lives > 0) {
        const px = W/2, py = H-80
        X.fillStyle = 'rgba(0,0,0,0.5)'; X.beginPath(); X.roundRect(px-6, py-50, 12, 60, 6); X.fill()
        const fh = 56 * S.plunger.pct
        X.fillStyle = '#f64'; X.shadowColor = '#f44'; X.shadowBlur = 10
        X.beginPath(); X.roundRect(px-4, py+4-fh, 8, fh, 4); X.fill(); X.shadowBlur = 0
        X.strokeStyle = '#fff'; X.lineWidth = 2; X.beginPath(); X.roundRect(px-6, py-50, 12, 60, 6); X.stroke()
        X.fillStyle = 'rgba(0,0,0,0.55)'; X.beginPath(); X.roundRect(W/2-110, H/2-30, 220, 60, 12); X.fill()
        X.fillStyle = '#0f8'; X.font = 'bold 20px "Fredoka One", sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle'
        X.fillText('SEGURE PARA LANÇAR', W/2, H/2)
      }

      X.fillStyle = '#fff'; X.font = 'bold 16px "Fredoka One", sans-serif'; X.textAlign = 'left'; X.textBaseline = 'top'
      X.shadowColor = 'rgba(0,0,0,0.7)'; X.shadowBlur = 4
      X.fillText(`SCORE: ${S.score}`, 14, 5); X.textAlign = 'right'
      X.fillText(`HI: ${S.hiScore}`, W-14, 5); X.shadowBlur = 0
      X.textAlign = 'left'; X.fillText(`x${S.multi.toFixed(1)}`, 14, 24)

      let ls = ''
      for (let i = 0; i < S.lives; i++) ls += '\u{1F7E2}'
      for (let i = S.lives; i < 3; i++) ls += '\u{26AB}'
      X.textAlign = 'right'; X.font = '14px sans-serif'
      X.fillText(ls, W-14, 6)

      if (S.ballSave) {
        X.fillStyle = `rgba(0,255,136,${0.3+Math.sin(S.frame*0.1)*0.2})`
        X.font = '10px "Press Start 2P", monospace'; X.textAlign = 'center'; X.textBaseline = 'bottom'
        X.fillText('BALL SAVE', W/2, H-5)
      }

      if (S.phase === 'over') {
        X.fillStyle = 'rgba(0,0,0,0.7)'; X.fillRect(0, 0, W, H)
        const isNew = S.score > S.hiScore
        if (isNew) { S.hiScore = S.score; localStorage.setItem(HS_KEY, String(S.hiScore)) }
        X.fillStyle = '#f44'; X.font = 'bold 36px "Fredoka One", sans-serif'
        X.textAlign = 'center'; X.textBaseline = 'middle'; X.shadowColor = '#f00'; X.shadowBlur = 20
        X.fillText('GAME OVER', W/2, H/2-40); X.shadowBlur = 0
        if (isNew) { X.fillStyle = '#fd0'; X.font = 'bold 18px "Press Start 2P", monospace'; X.fillText('★ NOVO RECORDE! ★', W/2, H/2+10) }
        X.fillStyle = '#0f8'; X.font = 'bold 22px "Fredoka One", sans-serif'
        X.fillText(`SCORE: ${S.score}`, W/2, H/2+50)
        X.fillStyle = 'rgba(255,255,255,0.5)'; X.font = '14px "Fredoka One", sans-serif'
        X.fillText(`Melhor: ${S.hiScore}`, W/2, H/2+80)
        X.fillStyle = '#fd0'; X.font = '14px "Press Start 2P", monospace'
        X.fillText('TOQUE PARA JOGAR', W/2, H/2+125)
      }

      X.restore()
    }

    function updateParticles() {
      for (const p of S.particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life -= p.decay }
      S.particles = S.particles.filter(p => p.life > 0)
      for (const ft of S.floatTexts) { ft.y += ft.vy; ft.life -= 0.018 }
      S.floatTexts = S.floatTexts.filter(ft => ft.life > 0)
    }

    function loop() {
      update(); updateParticles(); draw()
      requestAnimationFrame(loop)
    }
    resetBall()
    loop()
  </script>
</body>
